name: Stock Monitor

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:          # Manual trigger

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -e .

      - name: Run monitor
        run: drop-sentinel monitor --platform all
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BARK_DEVICE_KEY: ${{ secrets.BARK_DEVICE_KEY }}
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}

      - name: Generate dashboard
        run: drop-sentinel dashboard

      - name: Commit updated data
        run: |
          git config user.name "drop-sentinel[bot]"
          git config user.email "bot@drop-sentinel"
          git add data/ docs/
          git diff --staged --quiet || git commit -m "data: update $(date -u +%Y%m%d-%H%M)"
          git push
